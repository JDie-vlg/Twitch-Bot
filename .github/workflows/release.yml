name: Release

on:
  push:
    tags:
      - 'v*'

jobs:

  windows:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - run: npm ci

      - name: Build & Publish
        run: npm run release
        env:
          GH_TOKEN: ${{ github.token }}

  mac:
    needs: windows

    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - run: npm ci

      - name: Build & Publish
        run: npm run release
        env:
          GH_TOKEN: ${{ github.token }}

  linux:
    needs: windows

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - run: npm ci

      - name: Build & Publish
        run: npm run release
        env:
          GH_TOKEN: ${{ github.token }}